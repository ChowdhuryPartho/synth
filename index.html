<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synth - World-Class Color Palettes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,700&family=Outfit:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --live: #8B5CF6;
  --bg:   #F9F8F5;
  --surface: #FFFFFF;
  --text: #141210;
  --mid:  #6B6560;
  --dim:  #B0A99F;
  --border: #E8E2D9;
  --radius: 12px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Grain ─── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9000;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}

/* HERO */
.hero {
  position: relative;
  padding: 72px 40px 56px;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}

/* Animated gradient blob behind hero */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
  transition: background 0.8s ease;
}
.blob1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, color-mix(in srgb, var(--live) 25%, transparent) 0%, transparent 70%);
  top: -200px; right: -100px;
  animation: blobDrift1 18s ease-in-out infinite;
}
.blob2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, color-mix(in srgb, var(--live) 15%, transparent) 0%, transparent 70%);
  bottom: -200px; left: 20%;
  animation: blobDrift2 22s ease-in-out infinite;
}

@keyframes blobDrift1 {
  0%,100%{ transform: translate(0,0) scale(1); }
  50%    { transform: translate(-60px, 40px) scale(1.1); }
}
@keyframes blobDrift2 {
  0%,100%{ transform: translate(0,0) scale(1); }
  50%    { transform: translate(80px,-60px) scale(1.15); }
}

.hero-inner {
  max-width: 1280px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
}

.hero-left {}

.hero-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 12px;
  display: block;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(64px, 10vw, 112px);
  font-weight: 700;
  line-height: 0.9;
  letter-spacing: -3px;
  color: var(--text);
  margin-bottom: 20px;
}

h1 em {
  font-style: italic;
  font-weight: 300;
  color: var(--live);
  transition: color 0.5s ease;
  display: inline-block;
}

.hero-sub {
  font-size: 16px;
  font-weight: 300;
  color: var(--mid);
  line-height: 1.6;
  max-width: 420px;
}

.hero-sub strong {
  color: var(--text);
  font-weight: 500;
}

.hero-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
}

.count-badge {
  font-family: 'Cormorant Garamond', serif;
  font-size: 64px;
  font-weight: 700;
  color: var(--live);
  line-height: 1;
  transition: color 0.5s;
  letter-spacing: -2px;
}

.count-sub {
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
}

.domain-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
}

@media (max-width: 640px) {
  .hero { padding: 48px 20px 40px; }
  .hero-right { display: none; }
  h1 { font-size: 56px; }
}

/* CONTROLS */
.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(249,248,245,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 40px;
}

.controls-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Search */
.search-wrap {
  position: relative;
}

.search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--dim);
  font-size: 14px;
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 13px 18px 13px 46px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  color: var(--text);
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#search::placeholder { color: var(--dim); }

#search:focus {
  border-color: var(--live);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--live) 12%, transparent);
}

/* Categories */
.cats {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.cats::-webkit-scrollbar { display: none; }

.cat-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 6px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}

.cat-btn:hover {
  border-color: var(--live);
  color: var(--live);
}

.cat-btn.active {
  background: var(--live);
  border-color: var(--live);
  color: #fff;
  box-shadow: 0 2px 12px color-mix(in srgb, var(--live) 30%, transparent);
}

@media (max-width: 640px) {
  .controls { padding: 12px 16px; }
}

/* GRID */
.grid-wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 40px 80px;
}

.results-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
  margin-bottom: 24px;
  text-transform: uppercase;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

@media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 780px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px)  { .grid { grid-template-columns: 1fr; } }
@media (max-width: 640px)  { .grid-wrap { padding: 20px 16px 60px; } }

/* ─── Card ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(0.34,1.4,0.64,1),
              box-shadow 0.25s ease,
              border-color 0.2s;
  animation: cardIn 0.4s both ease;
  position: relative;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.06);
  border-color: var(--live);
}

/* Color bar */
.card-bar {
  height: 64px;
  display: flex;
  transition: height 0.3s cubic-bezier(0.34,1.2,0.64,1);
  overflow: hidden;
}

.card:hover .card-bar { height: 80px; }

.card-bar-strip {
  flex: 1;
  position: relative;
  transition: flex 0.3s;
}

/* Hex on hover */
.card-bar-strip::after {
  content: attr(data-hex);
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
  letter-spacing: 0.5px;
}

.card:hover .card-bar-strip::after { opacity: 1; }

/* Card body */
.card-body {
  padding: 12px 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
  line-height: 1.1;
  transition: color 0.2s;
}

.card:hover .card-name { color: var(--live); }

.card-cat {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Copy row (shown on hover) */
.card-actions {
  display: flex;
  gap: 4px;
  margin-top: 8px;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.2s;
  flex-wrap: wrap;
}

.card:hover .card-actions {
  opacity: 1;
  transform: translateY(0);
}

.copy-swatch {
  height: 22px;
  flex: 1;
  min-width: 40px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}

.copy-swatch:hover {
  transform: scaleY(1.15);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.copy-swatch::after {
  content: 'COPY';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  opacity: 0;
  transition: opacity 0.15s;
}
.copy-swatch:hover::after { opacity: 1; }

/* CSS button */
.copy-css-btn {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--mid);
  cursor: pointer;
  transition: all 0.15s;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.2s;
}

.card:hover .copy-css-btn {
  opacity: 1;
  transform: translateY(0);
}

.copy-css-btn:hover {
  border-color: var(--live);
  color: var(--live);
  background: color-mix(in srgb, var(--live) 6%, transparent);
}

/* Empty state */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--dim);
}

.no-results-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  font-weight: 300;
  font-style: italic;
  margin-bottom: 8px;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text);
  color: var(--bg);
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  pointer-events: none;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="grid-wrap">

<div class="toast" id="toast"></div>

// STATE

const categories = ['All', ...new Set(P.map(p => p.c))];
let activeCat = 'All';
let searchQ   = '';

// CATEGORIES

function buildCats() {
  const wrap = document.getElementById('cats');
  wrap.innerHTML = categories.map(c => `
    <button class="cat-btn ${c==='All'?'active':''}" onclick="setCat('${c}')" id="cat-${c.replace(/[^a-z]/gi,'_')}">${c}</button>
  `).join('');
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`cat-${cat.replace(/[^a-z]/gi,'_')}`).classList.add('active');
  renderGrid();
}

// FILTER + RENDER

function filterAll() {
  searchQ = document.getElementById('search').value.toLowerCase();
  renderGrid();
}

function filtered() {
  return P.filter(p => {
    const matchCat = activeCat === 'All' || p.c === activeCat;
    const matchQ   = !searchQ || p.n.toLowerCase().includes(searchQ) ||
                     p.c.toLowerCase().includes(searchQ) ||
                     p.h.some(h => h.toLowerCase().includes(searchQ));
    return matchCat && matchQ;
  });
}

function renderGrid() {
  const list  = filtered();
  const grid  = document.getElementById('grid');
  const meta  = document.getElementById('meta');
  const count = document.getElementById('liveCount');

  meta.textContent  = `${list.length} palettes`;
  count.textContent = list.length;

  if (!list.length) {
    grid.innerHTML = `
      <div class="no-results">
        <div class="no-results-title">Nothing found</div>
        <div style="color:var(--dim);font-size:13px">Try a different search or category</div>
      </div>`;
    return;
  }

  grid.innerHTML = list.map((p, i) => buildCard(p, i)).join('');
}

function buildCard(p, i) {
  const delay = Math.min(i * 0.03, 0.4);
  const bar   = p.h.map(hex => `
    <div class="card-bar-strip" 
         style="background:${hex}" 
         data-hex="${hex}"
         onclick="event.stopPropagation(); copyHex('${hex}')"></div>`).join('');
  const swatches = p.h.map(hex => `
    <button class="copy-swatch" 
            style="background:${hex}" 
            onclick="event.stopPropagation(); copyHex('${hex}')"
            title="Copy ${hex}"></button>`).join('');

  return `
    <div class="card" 
         style="animation-delay:${delay}s"
         onmouseenter="setLive('${p.h[0]}')"
         onclick="copyCSS(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="card-bar">${bar}</div>
      <div class="card-body">
        <div class="card-name">${p.n}</div>
        <div class="card-cat">${p.c}</div>
        <div class="card-actions">${swatches}</div>
        <button class="copy-css-btn" onclick="event.stopPropagation(); copyCSS(${JSON.stringify(p).replace(/"/g,'&quot;')})">
          ⌘ Copy CSS vars
        </button>
      </div>
    </div>`;
}

// DYNAMIC ACCENT

function setLive(hex) {
  document.documentElement.style.setProperty('--live', hex);
}


// COPY ACTIONS

function copyHex(hex) {
  navigator.clipboard.writeText(hex).then(() => toast(`Copied ${hex}`));
}

function copyCSS(p) {
  if (typeof p === 'string') {
    try { p = JSON.parse(p); } catch(e) { return; }
  }
  const vars = p.h.map((hex, i) => `  --${slugify(p.n)}-${i+1}: ${hex};`).join('\n');
  const css  = `:root {\n${vars}\n}`;
  navigator.clipboard.writeText(css).then(() => toast(`Copied "${p.n}" as CSS vars`));
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g,'');
}

// ══════════════════════════════════
// TOAST
// ══════════════════════════════════
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// INIT

buildCats();
renderGrid();
